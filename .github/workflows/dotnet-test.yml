name: dotnet test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: |
            EventEaseApp.sln
            EventEaseApp.csproj
            Tests/EventEaseApp.Tests.csproj

      - name: Restore dependencies
        run: dotnet restore EventEaseApp.sln

      - name: Run tests
        run: dotnet test EventEaseApp.sln --configuration Release --no-restore
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EventEaseApp</title>
    <base href="/EventEaseApp/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="lib/bootstrap-icons/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="EventEaseApp.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="lib/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        window.eventEase = window.eventEase || {};

        window.eventEase.isTextEntryElement = (element) => {
            if (!element) {
                return false;
            }

            const tagName = element.tagName?.toLowerCase();
            if (tagName === 'textarea') {
                return true;
            }

            if (tagName !== 'input') {
                return false;
            }

            const inputType = (element.getAttribute('type') || 'text').toLowerCase();
            return !['button', 'checkbox', 'color', 'file', 'hidden', 'image', 'radio', 'range', 'reset', 'submit'].includes(inputType);
        };

        window.eventEase.hideTooltip = (element) => {
            const tooltip = bootstrap.Tooltip.getInstance(element);

            if (tooltip) {
                tooltip.hide();
            }
        };

        window.eventEase.hideAllTooltips = (exceptElement) => {
            document.querySelectorAll('[data-bs-toggle="tooltip"]').forEach((element) => {
                if (element !== exceptElement) {
                    window.eventEase.hideTooltip(element);
                }
            });
        };

        window.eventEase.initializeTooltips = () => {
            if (!window.eventEase.listenersRegistered) {
                document.addEventListener('click', (event) => {
                    const trigger = event.target.closest('[data-bs-toggle="tooltip"]');
                    window.eventEase.hideAllTooltips(trigger);
                });

                document.addEventListener('focusin', (event) => {
                    const trigger = event.target.closest('[data-bs-toggle="tooltip"]');
                    window.eventEase.hideAllTooltips(trigger);
                });

                window.eventEase.listenersRegistered = true;
            }

            const tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]');

            tooltipTriggerList.forEach((element) => {
                const isTextEntryElement = window.eventEase.isTextEntryElement(element);

                bootstrap.Tooltip.getOrCreateInstance(element, {
                    trigger: isTextEntryElement ? 'hover' : 'hover focus',
                    container: 'body'
                });

                if (element.dataset.tooltipBound === 'true') {
                    return;
                }

                if (!isTextEntryElement) {
                    element.addEventListener('click', () => {
                        window.eventEase.hideTooltip(element);

                        if (typeof element.blur === 'function') {
                            element.blur();
                        }
                    });
                }

                element.addEventListener('mouseleave', () => {
                    window.eventEase.hideTooltip(element);
                });

                element.addEventListener('focusout', () => {
                    window.eventEase.hideTooltip(element);
                });

                element.addEventListener('keydown', (event) => {
                    if (event.key === 'Escape') {
                        window.eventEase.hideTooltip(element);
                    }
                });

                element.dataset.tooltipBound = 'true';
            });
        };
    </script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
